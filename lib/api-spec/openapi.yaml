openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: spy
    description: SPY ETF market data and prediction operations
  - name: trading
    description: Intraday scalp and swing options trade signals
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /spy/data:
    get:
      operationId: getSpyData
      tags: [spy]
      summary: Get SPY historical price data
      description: Returns historical OHLCV data for SPY ETF with configurable period
      parameters:
        - name: period
          in: query
          required: false
          schema:
            type: string
            enum: [1mo, 3mo, 6mo, 1y, 2y]
            default: 6mo
          description: Time period for historical data
      responses:
        "200":
          description: Historical price data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SpyDataResponse"
        "500":
          description: Error fetching data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /spy/options:
    get:
      operationId: getSpyOptions
      tags: [spy]
      summary: Get highest-probability CALL or PUT signal
      description: Returns a full options trade recommendation with entry, stop loss, and targets
      responses:
        "200":
          description: Options trade signal
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OptionsSignalResponse"
        "500":
          description: Error computing signal
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /trading/intraday:
    get:
      operationId: getIntradaySignal
      tags: [trading]
      summary: Get 5-min intraday CALL/PUT scalp signal
      description: Returns a real-time CALL/PUT options signal based on 5-minute bar momentum for intraday scalp option buying
      responses:
        "200":
          description: Intraday scalp signal
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TradingSignalResponse"
        "500":
          description: Error computing signal
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /trading/swing:
    get:
      operationId: getSwingSignal
      tags: [trading]
      summary: Get daily swing BTST CALL/PUT signal
      description: Returns an end-of-day CALL/PUT options signal for buy-today-sell-tomorrow positions (3-7 DTE options)
      responses:
        "200":
          description: Swing BTST signal
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TradingSignalResponse"
        "500":
          description: Error computing signal
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /spy/prediction:
    get:
      operationId: getSpyPrediction
      tags: [spy]
      summary: Get SPY movement prediction
      description: Returns technical indicator analysis and directional prediction for SPY ETF
      responses:
        "200":
          description: Prediction based on technical analysis
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SpyPredictionResponse"
        "500":
          description: Error computing prediction
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error
    OhlcvBar:
      type: object
      properties:
        date:
          type: string
          description: ISO date string
        open:
          type: number
        high:
          type: number
        low:
          type: number
        close:
          type: number
        volume:
          type: number
      required:
        - date
        - open
        - high
        - low
        - close
        - volume
    SpyDataResponse:
      type: object
      properties:
        symbol:
          type: string
        period:
          type: string
        bars:
          type: array
          items:
            $ref: "#/components/schemas/OhlcvBar"
        currentPrice:
          type: number
        priceChange:
          type: number
          description: Absolute price change from first to last bar
        priceChangePct:
          type: number
          description: Percentage price change from first to last bar
      required:
        - symbol
        - period
        - bars
        - currentPrice
        - priceChange
        - priceChangePct
    IndicatorValue:
      type: object
      properties:
        name:
          type: string
        value:
          type: number
        signal:
          type: string
          enum: [bullish, bearish, neutral]
        description:
          type: string
      required:
        - name
        - value
        - signal
        - description
    SpyPredictionResponse:
      type: object
      properties:
        symbol:
          type: string
        timestamp:
          type: string
        currentPrice:
          type: number
        prediction:
          type: string
          enum: [bullish, bearish, neutral]
        confidence:
          type: number
          description: Confidence score 0-100
        summary:
          type: string
          description: Human-readable summary of the prediction rationale
        indicators:
          type: array
          items:
            $ref: "#/components/schemas/IndicatorValue"
        priceTargets:
          $ref: "#/components/schemas/PriceTargets"
        scalpTargets:
          $ref: "#/components/schemas/IntradayScalpTargets"
      required:
        - symbol
        - timestamp
        - currentPrice
        - prediction
        - confidence
        - summary
        - indicators
        - priceTargets
        - scalpTargets
    PriceTargets:
      type: object
      properties:
        support:
          type: number
        resistance:
          type: number
        upside:
          type: number
          description: Estimated upside target
        downside:
          type: number
          description: Estimated downside target
      required:
        - support
        - resistance
        - upside
        - downside
    ScalpSetup:
      type: object
      properties:
        entry:
          type: number
        t1:
          type: number
          description: First take-profit target
        t2:
          type: number
          description: Second take-profit target
        stopLoss:
          type: number
        riskReward:
          type: number
          description: Risk/reward ratio
      required:
        - entry
        - t1
        - t2
        - stopLoss
        - riskReward
    IntradayScalpTargets:
      type: object
      properties:
        bias:
          type: string
          enum: [long, short, neutral]
        score:
          type: number
          description: Short-term momentum score used to determine bias (-100 to +100)
        atr:
          type: number
          description: Daily ATR used for intraday range estimation
        estimatedDayRange:
          type: number
          description: Estimated intraday price range based on ATR
        longSetup:
          $ref: "#/components/schemas/ScalpSetup"
        shortSetup:
          $ref: "#/components/schemas/ScalpSetup"
        notes:
          type: string
          description: Brief rationale for today's scalp bias
      required:
        - bias
        - score
        - atr
        - estimatedDayRange
        - longSetup
        - shortSetup
        - notes
    OptionsTradeSetup:
      type: object
      properties:
        side:
          type: string
          enum: [CALL, PUT]
        strike:
          type: number
        expiration:
          type: string
        daysToExpiry:
          type: number
        premiumEntry:
          type: number
          description: Option ask price to buy at
        premiumStop:
          type: number
          description: Exit if premium falls to this level (capital preservation)
        premiumT1:
          type: number
          description: First take-profit on premium (2x)
        premiumT2:
          type: number
          description: Second take-profit on premium (3.5x)
        underlyingEntry:
          type: number
        underlyingStop:
          type: number
        underlyingT1:
          type: number
        underlyingT2:
          type: number
        impliedVolatility:
          type: ["number", "null"]
        delta:
          type: ["number", "null"]
        openInterest:
          type: ["number", "null"]
        volume:
          type: ["number", "null"]
      required:
        - side
        - strike
        - expiration
        - daysToExpiry
        - premiumEntry
        - premiumStop
        - premiumT1
        - premiumT2
        - underlyingEntry
        - underlyingStop
        - underlyingT1
        - underlyingT2
        - impliedVolatility
        - delta
        - openInterest
        - volume
    TradingTradeSetup:
      type: object
      description: Options trade setup for CALL or PUT buying (no spreads, no selling)
      properties:
        side:
          type: string
          enum: [CALL, PUT]
        strike:
          type: number
        expiration:
          type: string
          description: Option expiration date (YYYY-MM-DD)
        daysToExpiry:
          type: number
        premiumEntry:
          type: number
          description: Option ask price to pay at entry
        premiumStop:
          type: number
          description: Exit option if premium falls to this (capital preservation)
        premiumT1:
          type: number
          description: First take-profit on premium
        premiumT2:
          type: number
          description: Second take-profit on premium (let it run)
        underlyingEntry:
          type: number
          description: SPY price at time of signal
        underlyingStop:
          type: number
          description: Close option if SPY reaches this level against trade
        underlyingT1:
          type: number
        underlyingT2:
          type: number
        impliedVolatility:
          type: ["number", "null"]
        delta:
          type: ["number", "null"]
        openInterest:
          type: ["number", "null"]
        volume:
          type: ["number", "null"]
      required:
        - side
        - strike
        - expiration
        - daysToExpiry
        - premiumEntry
        - premiumStop
        - premiumT1
        - premiumT2
        - underlyingEntry
        - underlyingStop
        - underlyingT1
        - underlyingT2
        - impliedVolatility
        - delta
        - openInterest
        - volume
    TradingSignalResponse:
      type: object
      properties:
        mode:
          type: string
          enum: [intraday, swing]
          description: "intraday = 5-min scalp, swing = daily BTST"
        signal:
          type: string
          enum: [CALL, PUT, WAIT]
        confidence:
          type: number
          description: Signal confidence 0-100
        score:
          type: number
          description: Momentum score -100 to +100
        reasoning:
          type: string
        keyFactors:
          type: array
          items:
            type: string
        currentPrice:
          type: number
        timestamp:
          type: string
        marketStatus:
          type: string
          enum: [open, premarket, afterhours, closed]
        nextBarIn:
          type: ["number", "null"]
          description: Seconds until next 5-min bar closes (intraday only)
        targetDate:
          type: ["string", "null"]
          description: Recommended entry date for swing BTST
        bars:
          type: array
          description: Price bars used for the chart (5-min for intraday, daily for swing)
          items:
            $ref: "#/components/schemas/OhlcvBar"
        trade:
          oneOf:
            - $ref: "#/components/schemas/TradingTradeSetup"
            - type: "null"
      required:
        - mode
        - signal
        - confidence
        - score
        - reasoning
        - keyFactors
        - currentPrice
        - timestamp
        - marketStatus
        - nextBarIn
        - targetDate
        - bars
        - trade
    OptionsSignalResponse:
      type: object
      properties:
        symbol:
          type: string
        timestamp:
          type: string
        currentPrice:
          type: number
        signal:
          type: string
          enum: [CALL, PUT, WAIT]
        confidence:
          type: number
        reasoning:
          type: string
        keyFactors:
          type: array
          items:
            type: string
        technicalScore:
          type: number
          description: Composite bull/bear score (-100 to +100, positive = bullish)
        trade:
          oneOf:
            - $ref: "#/components/schemas/OptionsTradeSetup"
            - type: "null"
      required:
        - symbol
        - timestamp
        - currentPrice
        - signal
        - confidence
        - reasoning
        - keyFactors
        - technicalScore
        - trade
