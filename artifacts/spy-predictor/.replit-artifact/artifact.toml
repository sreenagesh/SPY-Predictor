kind = "web"
previewPath = "/"
title = "SPY ETF Predictor"
version = "1.0.0"
id = "artifacts/spy-predictor"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24154

[services.development]
run = "pnpm --filter @workspace/spy-predictor run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/spy-predictor", "run", "build" ]
publicDir = "artifacts/spy-predictor/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24154"
BASE_PATH = "/"
